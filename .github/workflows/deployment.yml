- name: Debug remote environment
        env:
          STB_HOST: ${{ secrets.STB_HOST }}
        run: |
          ssh -F $HOME/.ssh/config "$STB_HOST" '
            whoami
            echo "HOME=$HOME"
            echo "PATH=$PATH"
            ls -la $HOME/.bun/bin 2>&1
            export BUN_INSTALL="$HOME/.bun"
            export PATH="$BUN_INSTALL/bin:$PATH"
            echo "PATH after export=$PATH"
            which bun
          'name: Deployment

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Bun
        run: |
          curl -fsSL https://bun.sh/install | bash
          echo "${HOME}/.bun/bin" >> $GITHUB_PATH

      - name: Install dependencies (validate lockfile)
        run: bun install

      - name: Install cloudflared
        run: |
          curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb

      - name: Setup SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_USER: ${{ secrets.SSH_USER }}
          STB_HOST: ${{ secrets.STB_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          cat >> ~/.ssh/config <<EOF
          Host $STB_HOST
            HostName $STB_HOST
            User $SSH_USER
            IdentityFile ~/.ssh/deploy_key
            ProxyCommand cloudflared access ssh --hostname %h
            StrictHostKeyChecking no
          EOF
          chmod 600 ~/.ssh/config

      - name: Sync files to server
        env:
          STB_HOST: ${{ secrets.STB_HOST }}
        run: |
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            -e "ssh -F $HOME/.ssh/config" \
            . "$STB_HOST:~/app/"

      - name: Install deps on server, restart, and health check
        env:
          STB_HOST: ${{ secrets.STB_HOST }}
        run: |
          ssh -F $HOME/.ssh/config "$STB_HOST" '
            set -e
            cd ~/app
            bun install --production
            sudo systemctl restart bun-app.service
            sleep 2
            curl -fsS http://localhost:3000/ > /dev/null
          '
          
      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
