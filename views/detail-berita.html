<!-- ================================================= -->
<!-- HERO -->
<!-- ================================================= -->

<section class="relative h-[450px] overflow-hidden">

    <img
        id="detail-news-image"
        src="assets/logos/ins.webp"
        class="absolute inset-0 w-full h-full object-cover">

    <div class="absolute inset-0 bg-blue-950/70"></div>

    <div class="relative max-w-6xl mx-auto px-6 h-full flex items-center">

        <div class="max-w-3xl text-white">

            <span
                class="uppercase tracking-[5px] text-cyan-400 text-sm font-semibold">

                News

            </span>

            <h1
                id="detail-news-title"
                class="text-5xl font-bold mt-4 leading-tight">

            </h1>

            <p
                id="detail-news-date"
                class="mt-6 text-blue-200">

            </p>

        </div>

    </div>

</section>


<!-- ================================================= -->
<!-- CONTENT -->
<!-- ================================================= -->

<section class="py-20 bg-white">

    <div class="max-w-6xl mx-auto px-6">

        <div class="grid lg:grid-cols-3 gap-12">

            <!-- Artikel -->

            <div class="lg:col-span-2">

                <p
                    id="detail-news-summary"
                    class="text-xl text-gray-700 leading-9">

                </p>

                <hr class="my-10">

                <div
                    id="detail-news-content"
                    class="space-y-8 text-gray-700 leading-9 text-justify">

                </div>

            </div>

            <!-- Sidebar -->

            <aside>

                <div class="bg-gray-50 rounded-2xl p-8 border">

                    <h3
                        class="text-xl font-bold text-blue-950">

                        Informasi

                    </h3>

                    <div class="mt-8 space-y-5">

                        <div>

                            <p class="text-gray-400 text-sm">

                                Dipublikasikan

                            </p>

                            <p
                                id="sidebar-date"
                                class="font-semibold text-blue-950">

                            </p>

                        </div>

                        <div>

                            <p class="text-gray-400 text-sm">

                                Kategori

                            </p>

                            <p class="font-semibold text-blue-950">

                                Berita Perusahaan

                            </p>

                        </div>

                        <div>

                            <p class="text-gray-400 text-sm">

                                Penulis

                            </p>

                            <p class="font-semibold text-blue-950">

                                CV. Neptune Eka Sarana

                            </p>

                        </div>

                    </div>

                </div>

                <div
                    class="bg-blue-950 rounded-2xl text-white p-8 mt-8">

                    <h3 class="text-2xl font-bold">

                        Butuh Informasi?

                    </h3>

                    <p class="mt-4 text-blue-200 leading-8">

                        Hubungi tim kami untuk mendapatkan informasi
                        mengenai inspeksi, sertifikasi maupun maintenance.

                    </p>

                    <button

                        onclick="switchPage('kontak')"

                        class="mt-8 w-full bg-cyan-500 hover:bg-cyan-600 py-3 rounded-lg font-semibold">

                        Hubungi Kami

                    </button>

                </div>

            </aside>

        </div>

    </div>

</section>


<!-- ================================================= -->
<!-- KEMBALI -->
<!-- ================================================= -->

<section class="bg-gray-100 py-12">

    <div class="max-w-6xl mx-auto px-6">

        <button

            onclick="switchPage('berita')"

            class="bg-blue-950 hover:bg-blue-800 text-white px-8 py-3 rounded-lg">

            ← Kembali ke Berita

        </button>

    </div>

</section>
